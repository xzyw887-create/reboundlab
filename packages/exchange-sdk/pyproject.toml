[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "exchange-sdk"
version = "0.1.0"
description = "ReboundLab exchange connectors"
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-mock>=3.12.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["exchange_sdk*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
